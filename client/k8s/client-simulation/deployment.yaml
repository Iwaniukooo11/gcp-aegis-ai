apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-error-generator
  namespace: aegis-simulation
  labels:
    app: aegis-error-generator
    component: client-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-error-generator
  template:
    metadata:
      labels:
        app: aegis-error-generator
        component: client-simulation
    spec:
      containers:
        - name: error-generator
          image: europe-central2-docker.pkg.dev/aegis-client-420/aegis-client-services/aegis-error-generator:latest
          imagePullPolicy: Always
          env:
            - name: ERROR_INTERVAL_SECONDS
              value: "30"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
