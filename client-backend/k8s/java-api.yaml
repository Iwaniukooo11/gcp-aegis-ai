apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-api
  labels:
    app.kubernetes.io/name: java-api
    app.kubernetes.io/part-of: aegis-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: java-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: java-api
        app.kubernetes.io/part-of: aegis-ai
    spec:
      containers:
        - name: java-api
          image: europe-central2-docker.pkg.dev/aegis-client-420/aegis-client-services/java-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: aegis-client-config
          env:
            - name: SERVICE_NAME
              value: java-api
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: java-api
  labels:
    app.kubernetes.io/name: java-api
    app.kubernetes.io/part-of: aegis-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: java-api
  ports:
    - name: http
      port: 8080
      targetPort: http
